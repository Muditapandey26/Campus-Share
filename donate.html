            </svg>

        </button>
        
        <!-- Nav Links Grouping -->
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-lg-center gap-2 pt-3 pt-lg-0">
                <li class="nav-item"><a class="nav-link nav-link-custom" href="index.html">Home</a></li>
<li class="nav-item"><a class="nav-link nav-link-custom" href="browse.html">Browse</a></li>
<li class="nav-item"><a class="nav-link nav-link-custom active" href="donate.html">Donate</a></li>
<li class="nav-item"><a class="nav-link nav-link-custom" href="request.html">Requests</a></li>
                    <a class="nav-link nav-btn-custom px-3 py-2 rounded-3 text-center" href="dashboard.html">

    </div>

    <main class="container my-5 py-4">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="custom-card p-4 p-md-5">
                    <div class="mb-4">
                        <span class="text-uppercase tracking-widest text-accent-cyan fw-bold small" style="color: var(--accent-cyan);">Circular Share Loop</span>
                        <h1 class="h2 fw-bold mt-1">List an Academic Asset</h1>
                        <p class="text-muted-custom">Add your item to the campus marketplace pool so peers can contact you to claim it.</p>
                    </div>

                    <form id="donationForm">
                        <div class="row g-3">
                            <div class="col-12">
                                <label for="itemName" class="form-label">Resource/Material Name</label>
                                <input type="text" id="itemName" class="form-control form-control-custom" placeholder="e.g., Fundamentals of Electric Circuits (Sadiku)" required>
                            </div>

                            <div class="col-md-6">
                                <label for="itemCategory" class="form-label">Classification Category</label>
                                <select id="itemCategory" class="form-select form-control-custom" required>
                                    <option value="Books">Books / Reference Manuals</option>
                                    <option value="Lab Kits">Laboratory Apparatus / Kits</option>
                                    <option value="Notes">Notes / Lecture Syllabus Logs</option>
                                    <option value="Electronics">Hardware / Engineering Electronics</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="itemCondition" class="form-label">Asset Condition</label>
                                <select id="itemCondition" class="form-select form-control-custom" required>
                                    <option value="Like New">Like New / Pristine</option>
                                    <option value="Good">Good / Marked Notes</option>
                                    <option value="Fair">Fair / Usable Wear</option>
                                    <option value="Digital">Digital (PDF / Drive URL)</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label for="ownerName" class="form-label">Your Name</label>
                                <input type="text" id="ownerName" class="form-control form-control-custom" placeholder="e.g., Rohan Sharma" required>
                            </div>

                            <div class="col-md-6">
                                <label for="contactInfo" class="form-label">Campus Email Address</label>
                                <input type="email" id="contactInfo" class="form-control form-control-custom" placeholder="e.g., rohan@campus.edu" required>
                            </div>

                            <div class="col-12">
                                <label for="itemDescription" class="form-label">Brief Description & Pickup Details</label>
                                <textarea id="itemDescription" rows="4" class="form-control form-control-custom" placeholder="Specify if there are missing parts, pencil markings, or details about meeting up on campus..." required></textarea>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-accent-custom w-100 py-3"><i class="fas fa-paper-plane me-2"></i> Deploy to Campus Feed</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <footer class="border-top border-secondary border-opacity-10 py-4 mt-auto text-center text-muted-custom small">
        <div class="container">
            <p class="mb-0">&copy; 2026 CampusShare Platform. Developed entirely client-side for immediate execution.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
